<svg width="940" height="260" viewBox="0 0 940 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .mono { font-family: 'JetBrains Mono', 'Cascadia Code', 'Courier New', monospace; }
    .blink { animation: blink 2.4s ease-in-out infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    .breathe { animation: breathe 7s ease-in-out infinite; }
    @keyframes breathe { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.95; } }
    .ember { animation: rise linear infinite; }
    @keyframes rise {
      0% { transform: translateY(0); opacity: 0; }
      10% { opacity: 0.6; }
      85% { opacity: 0.6; }
      100% { transform: translateY(-240px); opacity: 0; }
    }
    .scan { animation: scan 6s linear infinite; }
    @keyframes scan { from { transform: translateY(-10px); } to { transform: translateY(270px); } }
    .flicker { animation: flicker 3.2s ease-in-out infinite; }
    @keyframes flicker { 0%, 100% { opacity: 0.22; } 50% { opacity: 0.34; } }
  </style>

  <!-- backdrop -->
  <rect width="940" height="260" fill="#050308"/>

  <!-- blood moon -->
  <g class="breathe">
    <circle cx="470" cy="150" r="150" fill="#b31b1b" opacity="0.14"/>
    <circle cx="470" cy="150" r="100" fill="#c1121f" opacity="0.12"/>
    <circle cx="470" cy="150" r="60" fill="#ff4444" opacity="0.08"/>
  </g>

  <!-- scanline -->
  <rect class="scan" x="0" y="0" width="940" height="3" fill="#ff4444" opacity="0.06"/>

  <!-- corner brackets -->
  <path d="M14 34 V14 H34" stroke="#ff4444" stroke-width="1.5"/>
  <path d="M906 14 H926 V34" stroke="#ff4444" stroke-width="1.5"/>
  <path d="M14 226 V246 H34" stroke="#ff4444" stroke-width="1.5"/>
  <path d="M926 226 V246 H906" stroke="#ff4444" stroke-width="1.5"/>

  <!-- top meta -->
  <text class="mono" x="40" y="42" font-size="11" letter-spacing="4" fill="#9a8f96">// PILOT: HIMANSHU</text>
  <text class="mono" x="900" y="42" font-size="11" letter-spacing="4" fill="#9a8f96" text-anchor="end">IIT JAMMU — CSE '28</text>

  <!-- giant outlined handle -->
  <text class="mono flicker" x="470" y="152" font-size="76" font-weight="700" letter-spacing="10"
        text-anchor="middle" fill="none" stroke="#ffebeb" stroke-width="1.2">GLASS_HANDLE</text>

  <!-- status dot + line -->
  <circle class="blink" cx="332" cy="192" r="4" fill="#ff4444"/>
  <text class="mono" x="346" y="196" font-size="12" letter-spacing="6" fill="#ff4444">SYSTEM OPERATIONAL</text>

  <!-- tagline -->
  <text class="mono" x="470" y="228" font-size="12" letter-spacing="5" text-anchor="middle" fill="#e8e4e6">
    SYSTEMS THINKER · PROBLEM SOLVER · <tspan fill="#ff4444">BUILDING THE FUTURE.</tspan>
  </text>

  <!-- embers -->
  <circle class="ember" cx="90"  cy="250" r="1.6" fill="#ff4444" style="animation-duration:11s; animation-delay:-2s"/>
  <circle class="ember" cx="180" cy="255" r="1.2" fill="#ff4444" style="animation-duration:14s; animation-delay:-7s"/>
  <circle class="ember" cx="300" cy="252" r="1.8" fill="#ff4444" style="animation-duration:9s;  animation-delay:-4s"/>
  <circle class="ember" cx="410" cy="258" r="1.1" fill="#ff8080" style="animation-duration:16s; animation-delay:-10s"/>
  <circle class="ember" cx="530" cy="251" r="1.5" fill="#ff4444" style="animation-duration:12s; animation-delay:-1s"/>
  <circle class="ember" cx="640" cy="256" r="1.3" fill="#ff8080" style="animation-duration:15s; animation-delay:-8s"/>
  <circle class="ember" cx="760" cy="253" r="1.7" fill="#ff4444" style="animation-duration:10s; animation-delay:-5s"/>
  <circle class="ember" cx="860" cy="257" r="1.2" fill="#ff4444" style="animation-duration:13s; animation-delay:-11s"/>
</svg>
